name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Generate version
        id: version
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $build = "${{ github.run_number }}"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $version = "$date.$build"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          python ci_release.py set-version $version

      - name: Ensure version changes
        run: |
          python ci_release.py ensure-changes ${{ steps.version.outputs.version }} --commit

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "SbtDeskTran" `
            --icon=icon.ico `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import json `
            --hidden-import threading `
            --hidden-import urllib.request `
            --hidden-import urllib.parse `
            --hidden-import urllib.error `
            --noconfirm `
            main.py

      - name: Package release assets
        run: python ci_release.py assets ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SbtDeskTran-${{ steps.version.outputs.version }}
          path: dist/SbtDeskTran-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python ci_release.py release ${{ steps.version.outputs.version }} --push-tag
