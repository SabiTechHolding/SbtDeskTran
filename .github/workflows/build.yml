name: Build EXE

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "SbtDeskTran" `
            --icon=icon.ico `
            --collect-all tkinter `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import json `
            --hidden-import threading `
            --hidden-import urllib.request `
            --hidden-import urllib.parse `
            --hidden-import urllib.error `
            --noconfirm `
            main.py

      - name: Get short SHA
        id: sha
        run: echo "short=$("${{ github.sha }}".Substring(0,7))" >> $env:GITHUB_OUTPUT

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SbtDeskTran-${{ steps.sha.outputs.short }}
          path: dist/SbtDeskTran.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Build ${{ steps.sha.outputs.short }}"
          body: |
            Auto-build from commit `${{ github.sha }}`

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** ${{ github.actor }}
          files: dist/SbtDeskTran.exe
          prerelease: false
