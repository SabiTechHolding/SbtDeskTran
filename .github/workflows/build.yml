name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify · ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            os: windows-latest
          - platform: macOS
            os: macos-latest
          - platform: Linux
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - run: npm ci
      - run: npm run build
      - run: npm run fmt:rust
      - run: npm run test:rust
      - run: npm run lint:rust

  release-metadata:
    name: Prepare release metadata
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      display_version: ${{ steps.version.outputs.display_version }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate release version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag="$GITHUB_REF_NAME"
          else
            version_parts="$(node -e "const v=require('./version.json'); const run=Number(process.env.GITHUB_RUN_NUMBER); if(!Number.isInteger(v.major)||v.major<0||!Number.isInteger(v.build)||v.build<0||!Number.isInteger(run)||run<1) process.exit(1); process.stdout.write(v.major+' '+Math.max(v.build+1,run))")"
            read -r major build <<< "$version_parts"
            tag="v${major}.$(date -u +'%y.%-m.%-d')-${build}"
          fi
          version="$(node scripts/set-version.mjs "$tag")"
          display_version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "display_version=$display_version" >> "$GITHUB_OUTPUT"

      - name: Commit generated version to main
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git diff --quiet -- version.json package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json; then
            echo "Version files are already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add version.json package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
            git commit -m "chore: update build version to ${RELEASE_TAG} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Require tagged version to be committed
        if: github.ref_type == 'tag'
        shell: bash
        run: git diff --exit-code -- version.json package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json

      - name: Select versioned source commit
        id: source
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  package:
    name: Package · ${{ matrix.platform }}
    needs: release-metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows x64
            os: windows-latest
            bundles: nsis
            target: ""
            rust_target: ""
            artifact: windows-x64
            bundle_path: target/release/bundle/**
          - platform: macOS Universal
            os: macos-latest
            bundles: app,dmg
            target: universal-apple-darwin
            rust_target: aarch64-apple-darwin,x86_64-apple-darwin
            artifact: macos-universal
            bundle_path: target/universal-apple-darwin/release/bundle/**
          - platform: Linux x64
            os: ubuntu-22.04
            bundles: appimage,deb,rpm
            target: ""
            rust_target: ""
            artifact: linux-x64
            bundle_path: target/release/bundle/**
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-metadata.outputs.source_sha }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust_target }}

      - name: Verify macOS universal Rust targets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          installed="$(rustup target list --installed)"
          grep -qx 'aarch64-apple-darwin' <<< "$installed"
          grep -qx 'x86_64-apple-darwin' <<< "$installed"

      - run: npm ci

      - name: Apply release version
        run: node scripts/set-version.mjs "${{ needs.release-metadata.outputs.tag }}"

      - name: Require updater signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is not configured"
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not configured"
          }

      - name: Configure optional Apple signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        env:
          CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          write_env() {
            if [[ -n "$2" ]]; then
              {
                echo "$1<<SBTDESKTOOL_ENV"
                echo "$2"
                echo "SBTDESKTOOL_ENV"
              } >> "$GITHUB_ENV"
            fi
          }
          write_env APPLE_CERTIFICATE "$CERTIFICATE"
          write_env APPLE_CERTIFICATE_PASSWORD "$CERTIFICATE_PASSWORD"
          write_env APPLE_SIGNING_IDENTITY "$SIGNING_IDENTITY"
          write_env APPLE_ID "$NOTARY_APPLE_ID"
          write_env APPLE_PASSWORD "$NOTARY_PASSWORD"
          write_env APPLE_TEAM_ID "$NOTARY_TEAM_ID"

      - name: Read first changelog entry
        id: release_notes
        shell: pwsh
        run: |
          "body<<SBTDESKTOOL_NOTES" >> $env:GITHUB_OUTPUT
          node scripts/release-notes.mjs >> $env:GITHUB_OUTPUT
          "SBTDESKTOOL_NOTES" >> $env:GITHUB_OUTPUT

      - name: Build and upload signed packages to draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target && format('--target {0} --bundles {1}', matrix.target, matrix.bundles) || format('--bundles {0}', matrix.bundles) }}
          tagName: ${{ needs.release-metadata.outputs.tag }}
          releaseName: SbtDeskTool ${{ needs.release-metadata.outputs.tag }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: ${{ runner.os == 'Windows' }}
          retryAttempts: 2

      - name: Prepare zipped Windows downloads
        if: runner.os == 'Windows'
        id: windows_downloads
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $directory = "target/release/bundle/release-downloads"
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          $portableDirectory = Join-Path $directory "portable-stage"
          New-Item -ItemType Directory -Force -Path $portableDirectory | Out-Null
          $portableExe = Join-Path $portableDirectory "SbtDeskTool.exe"
          $portableArchive = Join-Path $directory "SbtDeskTool_${{ needs.release-metadata.outputs.display_version }}_x64-portable.zip"
          Copy-Item -LiteralPath "target/release/sbt-desk-tool.exe" -Destination $portableExe -Force
          Compress-Archive -LiteralPath $portableExe -DestinationPath $portableArchive -Force
          Remove-Item -LiteralPath $portableDirectory -Recurse -Force

          $installers = @(Get-ChildItem -LiteralPath "target/release/bundle/nsis" -Filter "*-setup.exe" -File)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Windows NSIS installer, found $($installers.Count)"
          }
          $installer = $installers[0]
          $installerDownloadName = "SbtDeskTool_${{ needs.release-metadata.outputs.display_version }}_x64-setup.exe"
          $installerArchive = Join-Path $directory "SbtDeskTool_${{ needs.release-metadata.outputs.display_version }}_x64-setup.zip"
          $installerDirectory = Join-Path $directory "installer-stage"
          New-Item -ItemType Directory -Force -Path $installerDirectory | Out-Null
          $installerDownload = Join-Path $installerDirectory $installerDownloadName
          Copy-Item -LiteralPath $installer.FullName -Destination $installerDownload -Force
          Compress-Archive -LiteralPath $installerDownload -DestinationPath $installerArchive -Force
          Remove-Item -LiteralPath $installerDirectory -Recurse -Force

          $portableZip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $portableArchive))
          try {
            $portableEntries = @($portableZip.Entries | ForEach-Object FullName)
            if ($portableEntries.Count -ne 1 -or $portableEntries[0] -ne "SbtDeskTool.exe") {
              throw "Portable ZIP must contain only SbtDeskTool.exe; found: $($portableEntries -join ', ')"
            }
          } finally {
            $portableZip.Dispose()
          }

          $installerZip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $installerArchive))
          try {
            $installerEntries = @($installerZip.Entries | ForEach-Object FullName)
            if ($installerEntries.Count -ne 1 -or $installerEntries[0] -ne $installerDownloadName) {
              throw "Installer ZIP must contain only $installerDownloadName; found: $($installerEntries -join ', ')"
            }
          } finally {
            $installerZip.Dispose()
          }

          "portable_path=$portableArchive" >> $env:GITHUB_OUTPUT
          "installer_path=$installerArchive" >> $env:GITHUB_OUTPUT
          "installer_asset_name=$($installer.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload zipped Windows downloads to draft release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-metadata.outputs.tag }}" `
            "${{ steps.windows_downloads.outputs.portable_path }}" `
            "${{ steps.windows_downloads.outputs.installer_path }}" `
            --clobber

          # Keep the unpacked signed installer uploaded by tauri-action. The
          # updater manifest points to that exact asset; the ZIP is only the
          # safer user-facing browser download.

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SbtDeskTool-${{ needs.release-metadata.outputs.display_version }}-${{ matrix.artifact }}
          path: |
            ${{ matrix.bundle_path }}
            ${{ runner.os == 'Windows' && steps.windows_downloads.outputs.portable_path || '' }}
            ${{ runner.os == 'Windows' && steps.windows_downloads.outputs.installer_path || '' }}
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish complete release
    needs: [release-metadata, package]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate updater assets and signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-metadata.outputs.tag }}
        run: node scripts/validate-updater-release.mjs

      - name: Publish draft after every platform succeeds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release-notes.mjs > release-notes.md
          gh release edit "${{ needs.release-metadata.outputs.tag }}" \
            --title "${{ needs.release-metadata.outputs.tag }}" \
            --notes-file release-notes.md \
            --draft=false \
            --latest
